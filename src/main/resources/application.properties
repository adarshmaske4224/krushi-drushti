# ==========================================
# krishidrishti - application.properties
# ==========================================

# Server
server.port=${PORT:8080}

# MySQL Database
#spring.datasource.url=jdbc:mysql://localhost:3306/krishi_drishti?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
#spring.datasource.username=root
#spring.datasource.password=adarsh4224
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
#spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# JWT
app.jwt.secret=${JWT_SECRET:krishidrishtiSecretKey2024SuperSecureBase64StringForJWT}
app.jwt.expiration=86400000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Groq API
ai.api.url = https://api.groq.com/openai/v1/chat/completions
ai.api.key = ${GROQ_API_KEY}
ai.api.model = llama-3.3-70b-versatile

# Gemini API (For Vision/Pest Detection)
gemini.vision.url = https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent
gemini.vision.key = ${GEMINI_VISION_KEY}

# AGMARKNET
agmarknet.api.url=https://api.data.gov.in/resource/9ef84268-d588-465a-a308-a864a43d0070
agmarknet.api.key=${AGMARKNET_API_KEY}

# Open-Meteo Weather API
weather.api.url=https://api.open-meteo.com/v1/forecast

# postgres db config (production)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
